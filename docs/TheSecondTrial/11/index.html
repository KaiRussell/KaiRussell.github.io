<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheSecondTrial — 11</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
    canvas { position: fixed; inset: 0; }
    .back { position: fixed; top: 2rem; left: 2rem; color: #fff; font-family: sans-serif; font-size: 0.9rem; letter-spacing: 0.08em; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); padding: 0.5rem 1.1rem; border-radius: 4px; transition: background 0.2s; z-index: 10; }
    .back:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <a href="/TheSecondTrial/" class="back">← Back</a>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const img = new Image();
    img.src = 'Cryptic.png';

    let mouseX = -999, mouseY = -999;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      if (img.complete && img.naturalWidth) {
        const scale = Math.min(W / img.naturalWidth, H / img.naturalHeight);
        const dw = img.naturalWidth * scale;
        const dh = img.naturalHeight * scale;
        ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
      }

      const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 54);
      grad.addColorStop(0,   'rgba(0,0,0,0)');
      grad.addColorStop(0.4, 'rgba(0,0,0,0)');
      grad.addColorStop(0.7, 'rgba(0,0,0,1)');
      grad.addColorStop(1,   'rgba(0,0,0,1)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(draw);
    }
    img.onload = draw;
    draw();
  </script>
</body>
</html>
