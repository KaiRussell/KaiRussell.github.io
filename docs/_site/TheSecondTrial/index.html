<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheSecondTrial</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .clock {
      position: relative;
      width: 0;
      height: 0;
    }
    .btn {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      font-family: sans-serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transform: translate(-50%, -50%);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div class="clock">
    <!-- Center button: 0 -->
    <a href="/TheSecondTrial/0/" class="btn" style="left: 0; top: 0;">0</a>

    <!-- r = 200px, angle = (N*30 - 90)deg -->
    <a href="/TheSecondTrial/12/" class="btn" style="left: 0px;    top: -200px;">12</a>
    <a href="/TheSecondTrial/1/"  class="btn" style="left: 100px;  top: -173px;">1</a>
    <a href="/TheSecondTrial/2/"  class="btn" style="left: 173px;  top: -100px;">2</a>
    <a href="/TheSecondTrial/3/"  class="btn" style="left: 200px;  top: 0px;">3</a>
    <a href="/TheSecondTrial/4/"  class="btn" style="left: 173px;  top: 100px;">4</a>
    <a href="/TheSecondTrial/5/"  class="btn" style="left: 100px;  top: 173px;">5</a>
    <a href="/TheSecondTrial/6/"  class="btn" style="left: 0px;    top: 200px;">6</a>
    <a href="/TheSecondTrial/7/"  class="btn" style="left: -100px; top: 173px;">7</a>
    <a href="/TheSecondTrial/8/"  class="btn" style="left: -173px; top: 100px;">8</a>
    <a href="/TheSecondTrial/9/"  class="btn" style="left: -200px; top: 0px;">9</a>
    <a href="/TheSecondTrial/10/" class="btn" style="left: -173px; top: -100px;">10</a>
    <a href="/TheSecondTrial/11/" class="btn" style="left: -100px; top: -173px;">11</a>
  </div>
</body>
</html>
