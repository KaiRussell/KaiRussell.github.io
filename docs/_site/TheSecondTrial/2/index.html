<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheSecondTrial — 2</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
    canvas { position: fixed; inset: 0; }
    .back { position: fixed; top: 2rem; left: 2rem; color: #fff; font-family: sans-serif; font-size: 0.9rem; letter-spacing: 0.08em; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); padding: 0.5rem 1.1rem; border-radius: 4px; transition: background 0.2s; z-index: 10; }
    .back:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <a href="/TheSecondTrial/" class="back">← Back</a>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const digits = [
      { ch: String.fromCharCode(54),  size: 32  },
      { ch: String.fromCharCode(48),  size: 64  },
      { ch: String.fromCharCode(56),  size: 96  },
      { ch: String.fromCharCode(52),  size: 128 },
      { ch: String.fromCharCode(51),  size: 160 },
      { ch: String.fromCharCode(57),  size: 224 },
    ];

    const state = digits.map((d, i) => ({
      ch: d.ch,
      size: d.size,
      x: 100 + Math.random() * (window.innerWidth - 200),
      y: 100 + Math.random() * (window.innerHeight - 200),
      vx: (1.5 + i * 0.3) * (Math.random() < 0.5 ? 1 : -1),
      vy: (1.5 + i * 0.3) * (Math.random() < 0.5 ? 1 : -1),
    }));

    let mouseX = -999, mouseY = -999;
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

    let flashlightOn = true;

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      for (const s of state) {
        ctx.font = `200 ${s.size}px sans-serif`;
        const w = ctx.measureText(s.ch).width;
        const h = s.size;

        s.x += s.vx; s.y += s.vy;
        if (s.x <= 0) { s.x = 0; s.vx = Math.abs(s.vx); }
        if (s.x + w >= W) { s.x = W - w; s.vx = -Math.abs(s.vx); }
        if (s.y - h <= 0) { s.y = h; s.vy = Math.abs(s.vy); }
        if (s.y >= H) { s.y = H; s.vy = -Math.abs(s.vy); }

        ctx.fillStyle = '#fff';
        ctx.fillText(s.ch, s.x, s.y);
      }

      // hint text
      ctx.textAlign = 'center';
      ctx.font = '200 3rem sans-serif';
      ctx.letterSpacing = '0.2em';
      ctx.fillStyle = '#fff';
      ctx.fillText('_ _, _ _ _ _', W / 2, H - 48);
      ctx.textAlign = 'right';
      ctx.font = '0.85rem sans-serif';
      ctx.letterSpacing = '0.08em';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillText('From small to large', W - 24, H - 20);
      ctx.textAlign = 'left';
      ctx.letterSpacing = '0';

      // flashlight overlay
      if (flashlightOn) {
        const grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 36);
        grad.addColorStop(0,   'rgba(0,0,0,0)');
        grad.addColorStop(0.4, 'rgba(0,0,0,0)');
        grad.addColorStop(0.7, 'rgba(0,0,0,1)');
        grad.addColorStop(1,   'rgba(0,0,0,1)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
